name: Socket Security

on:
  pull_request:
    branches: ['**']
  push:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  socket-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Socket Security CLI
        run: pip install --upgrade socketsecurity

      - name: Run Socket Security scan
        run: socketcli
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
