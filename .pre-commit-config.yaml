repos:
  # 1. UNIVERSAL SECRET SCANNING (Extremely fast, blocks secrets at the gate)
  - repo: https://github.com/gitleaks/gitleaks
    rev: 'v8.30.0'
    hooks:
      - id: gitleaks
        description: Prevent developers from accidentally committing passwords and API keys to Git.

  # 2. IaC / TERRAFORM SECURITY SCAN (For infrastructure source code)
  - repo: https://github.com/aquasecurity/tfsec
    rev: 'v1.28.14'
    hooks:
      - id: tfsec
        args: ['--minimum-severity=MEDIUM'] # Ignore LOW severity issues to prevent developer alert fatigue
        description: Scan for security misconfigurations in Terraform files (AWS, GCP, Azure).

  # 3. ULTRA-FAST STATIC ANALYSIS (SAST) WITH SEMGREP
  - repo: https://github.com/returntocorp/semgrep
    rev: 'v1.151.0'
    hooks:
      - id: semgrep
        name: semgrep
        description: Scan for security vulnerabilities in source code.
        # Use specific high-quality rulesets (low false positives) instead of a full scan
        args:
          - --config=p/javascript
          - --config=p/nodejs
          - --error